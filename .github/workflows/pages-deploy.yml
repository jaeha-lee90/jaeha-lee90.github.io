name: Automatic build

on:
  push:
    branches:
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

jobs:
  continuous-delivery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Debug environment
        run: |
          ruby --version
          gem --version
          gem env home
          which bundle && bundle --version || echo "no bundle on PATH yet"
          gem list bundler || true
          echo "--- BUNDLED_WITH from lockfile ---"
          tail -3 Gemfile.lock
          echo "--- PLATFORMS ---"
          awk '/^PLATFORMS/,/^$/' Gemfile.lock

      - name: Install bundler + gems
        run: |
          gem install bundler -v 2.6.9 --no-document
          bundle config set --local frozen false
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3
          bundle info jekyll | head -3

      - name: Check baseurl
        run: |
          baseurl="$(grep '^baseurl:' _config.yml | sed "s/.*: *//;s/['\"]//g;s/#.*//")"
          if [[ -n $baseurl ]]; then
            echo "BASE_URL=$baseurl" >> $GITHUB_ENV
          fi

      - name: Build Site
        env:
          JEKYLL_ENV: production
        run: |
          bundle exec jekyll b -d "_site$BASE_URL"

      - name: Deploy
        run: |
          if [[ -n $BASE_URL ]]; then
            mv _site$BASE_URL _site-rename
            rm -rf _site
            mv _site-rename _site
          fi

          bash tools/deploy.sh
